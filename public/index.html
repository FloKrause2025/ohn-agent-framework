<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OHN Agent Testing</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f172a;
      --surface:   #1e293b;
      --surface2:  #273549;
      --border:    #334155;
      --accent:    #e11d48;
      --blue:      #3b82f6;
      --text:      #f1f5f9;
      --text-muted:#94a3b8;
      --high:      #ef4444;
      --medium:    #f59e0b;
      --low:       #22c55e;
      --radius:    12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    header .logo { font-size: 22px; }
    header h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
    header p  { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
    header .badge {
      margin-left: auto;
      background: #064e3b;
      color: #6ee7b7;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 99px;
    }

    /* ── Layout ─────────────────────────────────────────────────────────── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ────────────────────────────────────────────────────────── */
    aside {
      width: 230px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .sidebar-section { padding: 16px 14px 6px; }
    .sidebar-section-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text-muted);
      text-transform: uppercase;
      padding: 0 4px;
      margin-bottom: 6px;
    }
    .agent-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      text-align: left;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.15s;
      position: relative;
    }
    .agent-btn:hover { background: var(--surface2); }
    .agent-btn.active { background: var(--surface2); }
    .agent-btn .emoji { font-size: 16px; width: 22px; text-align: center; }
    .agent-btn .name  { flex: 1; }
    .agent-btn .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
    }
    .agent-btn.live .dot     { background: #22c55e; }
    .agent-btn.building .dot { background: #f59e0b; }
    .agent-btn.disabled { opacity: 0.45; cursor: default; }
    .agent-btn .status-tag {
      font-size: 9px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--border);
      color: var(--text-muted);
      letter-spacing: 0.3px;
    }
    .agent-btn.live .status-tag {
      background: #064e3b;
      color: #6ee7b7;
    }

    /* ── Chat Area ──────────────────────────────────────────────────────── */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .agent-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .agent-header-inner {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .agent-header .big-emoji { font-size: 28px; }
    .agent-header h2 { font-size: 16px; font-weight: 700; }
    .agent-header p  { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Message Bubbles ─────────────────────────────────────────────────── */
    .msg { display: flex; flex-direction: column; max-width: 88%; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.agent { align-self: flex-start; align-items: flex-start; }

    .msg-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 5px;
      padding: 0 4px;
    }

    .bubble {
      padding: 11px 15px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.55;
    }
    .msg.user .bubble {
      background: var(--blue);
      color: white;
      border-bottom-right-radius: 3px;
    }
    .msg.agent .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 3px;
      max-width: 100%;
      width: 100%;
    }

    /* ── Structured Output Cards ─────────────────────────────────────────── */
    .result-wrap { display: flex; flex-direction: column; gap: 12px; width: 100%; }

    .funnel-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }
    .funnel-card h4 {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 10px;
    }
    .funnel-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      padding: 3px 0;
      border-bottom: 1px solid var(--border);
    }
    .funnel-row:last-child { border-bottom: none; }
    .funnel-row .label { color: var(--text-muted); }
    .funnel-row .value { font-weight: 700; font-size: 14px; }
    .funnel-arrow { color: var(--text-muted); font-size: 10px; padding: 2px 0; }

    .shortlist-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .topic-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      border-left: 3px solid var(--border);
    }
    .topic-card.high   { border-left-color: var(--high); }
    .topic-card.medium { border-left-color: var(--medium); }
    .topic-card.low    { border-left-color: var(--low); }

    .topic-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .topic-rank {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--border);
      font-size: 11px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .topic-name { font-size: 14px; font-weight: 700; flex: 1; }
    .urgency-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 99px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .urgency-badge.high   { background: #450a0a; color: #fca5a5; }
    .urgency-badge.medium { background: #451a03; color: #fde68a; }
    .urgency-badge.low    { background: #052e16; color: #86efac; }

    .topic-category {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .topic-field {
      font-size: 12px;
      margin-bottom: 5px;
      line-height: 1.5;
    }
    .topic-field .field-label {
      color: var(--text-muted);
      font-weight: 600;
      margin-right: 4px;
    }
    .topic-stats {
      display: flex;
      gap: 14px;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    .topic-stat { font-size: 11px; color: var(--text-muted); }
    .topic-stat strong { color: var(--text); }
    .topic-link {
      margin-top: 6px;
      font-size: 11px;
    }
    .topic-link a { color: #60a5fa; text-decoration: none; }
    .topic-link a:hover { text-decoration: underline; }
    .new-variant-tag {
      display: inline-block;
      background: #312e81;
      color: #a5b4fc;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      margin-left: 6px;
    }

    .excluded-toggle {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 12px;
      padding: 8px 14px;
      cursor: pointer;
      width: 100%;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .excluded-toggle:hover { background: var(--surface2); color: var(--text); }
    .excluded-list {
      display: none;
      flex-direction: column;
      gap: 6px;
      margin-top: 8px;
    }
    .excluded-list.open { display: flex; }
    .excluded-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 12px;
    }
    .excluded-item .ex-title { color: var(--text-muted); margin-bottom: 2px; }
    .excluded-item .ex-reason { color: #f87171; }

    .agent-note-card {
      background: #1a1035;
      border: 1px solid #4c1d95;
      border-radius: var(--radius);
      padding: 12px 14px;
      font-size: 13px;
      color: #c4b5fd;
      font-style: italic;
      line-height: 1.6;
    }
    .agent-note-card::before {
      content: "👀 Researchy says: ";
      font-style: normal;
      font-weight: 700;
      color: #a78bfa;
    }

    .summary-line {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      padding: 4px 0;
    }

    /* ── Typing Indicator ────────────────────────────────────────────────── */
    .typing {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 3px;
      width: fit-content;
    }
    .typing span {
      width: 7px; height: 7px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* ── Input Area ──────────────────────────────────────────────────────── */
    .input-area {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }
    .input-area input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      padding: 11px 16px;
      outline: none;
      transition: border-color 0.15s;
    }
    .input-area input:focus { border-color: var(--blue); }
    .input-area input::placeholder { color: var(--text-muted); }
    .input-area input:disabled { opacity: 0.5; }
    .send-btn {
      background: var(--blue);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      padding: 11px 20px;
      cursor: pointer;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }
    .send-btn:hover   { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.4; cursor: default; }

    /* ── Welcome State ───────────────────────────────────────────────────── */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 8px;
      color: var(--text-muted);
      text-align: center;
      padding: 40px;
    }
    .welcome .big { font-size: 40px; margin-bottom: 8px; }
    .welcome h3 { font-size: 18px; font-weight: 700; color: var(--text); }
    .welcome p  { font-size: 14px; max-width: 340px; line-height: 1.6; }
    .hint-pills {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center;
      margin-top: 12px;
    }
    .hint-pill {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 99px;
      font-size: 12px;
      padding: 6px 14px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .hint-pill:hover { background: var(--border); }

    /* ── Error ───────────────────────────────────────────────────────────── */
    .error-bubble {
      background: #450a0a;
      border: 1px solid #7f1d1d;
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 13px;
      color: #fca5a5;
    }

    /* ── Thinking Block ──────────────────────────────────────────────────── */
    .thinking-toggle {
      background: linear-gradient(135deg, #1a1035 0%, #0f172a 100%);
      border: 1px solid #4c1d95;
      border-radius: 8px;
      color: #a78bfa;
      font-size: 12px;
      padding: 8px 14px;
      cursor: pointer;
      width: 100%;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .thinking-toggle:hover { border-color: #7c3aed; color: #c4b5fd; }
    .thinking-toggle .think-label { display: flex; align-items: center; gap: 6px; }
    .thinking-panel {
      display: none;
      background: #0d0b1a;
      border: 1px solid #4c1d95;
      border-top: none;
      border-radius: 0 0 8px 8px;
      padding: 14px 16px;
      font-size: 12px;
      color: #c4b5fd;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 500px;
      overflow-y: auto;
    }
    .thinking-panel.open { display: block; }
    .thinking-panel::-webkit-scrollbar { width: 4px; }
    .thinking-panel::-webkit-scrollbar-thumb { background: #4c1d95; border-radius: 2px; }

    /* ── Pipeline Logs ───────────────────────────────────────────────────── */
    .logs-toggle {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 11px;
      font-family: monospace;
      padding: 6px 12px;
      cursor: pointer;
      width: 100%;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 4px;
    }
    .logs-toggle:hover { background: var(--surface2); color: var(--text); }
    .logs-panel {
      display: none;
      flex-direction: column;
      gap: 2px;
      margin-top: 8px;
      background: #0a0f1a;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      max-height: 400px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 11px;
    }
    .logs-panel.open { display: flex; }
    .logs-panel::-webkit-scrollbar { width: 4px; }
    .logs-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .log-entry { display: flex; gap: 8px; align-items: flex-start; padding: 2px 0; border-bottom: 1px solid #0f172a; }
    .log-ts    { color: #475569; flex-shrink: 0; white-space: nowrap; }
    .log-badge {
      flex-shrink: 0; font-size: 9px; font-weight: 700;
      padding: 1px 5px; border-radius: 3px; text-transform: uppercase; white-space: nowrap;
    }
    .log-badge.info  { background: #1e3a5f; color: #93c5fd; }
    .log-badge.debug { background: #1a1a2e; color: #818cf8; }
    .log-badge.warn  { background: #3b2500; color: #fbbf24; }
    .log-badge.error { background: #450a0a; color: #fca5a5; }
    .log-step    { color: #64748b; flex-shrink: 0; }
    .log-message { color: #cbd5e1; flex: 1; word-break: break-word; }
    .log-data-toggle {
      background: transparent; border: 1px solid #1e293b; border-radius: 3px;
      color: #475569; font-size: 10px; padding: 1px 5px; cursor: pointer;
      font-family: monospace; flex-shrink: 0;
    }
    .log-data-toggle:hover { color: #94a3b8; border-color: #334155; }
    .log-data-block {
      display: none; background: #0d1117; border: 1px solid #1e293b;
      border-radius: 4px; padding: 8px; margin-top: 4px;
      white-space: pre-wrap; word-break: break-word;
      color: #7dd3fc; font-size: 10px; max-height: 300px; overflow-y: auto;
    }
    .log-data-block.open { display: block; }
  </style>
</head>
<body>

<header>
  <div class="logo">🛡️</div>
  <div>
    <h1>OHN Agent Testing</h1>
    <p>oh HACK no! — Internal Tools</p>
  </div>
  <div class="badge">Internal Only</div>
</header>

<div class="layout">

  <!-- Sidebar -->
  <aside>
    <div class="sidebar-section">
      <div class="sidebar-section-title">Content Pipeline</div>
      <button class="agent-btn live"        data-agent="researchy"      onclick="selectAgent(this)">
        <span class="emoji">👀</span><span class="name">Researchy</span>
        <span class="dot"></span>
      </button>
      <button class="agent-btn live"        data-agent="googly"      onclick="selectAgent(this)">
        <span class="emoji">🔍</span><span class="name">Googly</span>
        <span class="dot"></span>
      </button>
      <button class="agent-btn disabled"    data-agent="scripty">
        <span class="emoji">🎬</span><span class="name">Scripty</span>
        <span class="status-tag">Soon</span>
      </button>
      <button class="agent-btn disabled"    data-agent="quality-gate">
        <span class="emoji">✅</span><span class="name">Quality Gate</span>
        <span class="status-tag">Soon</span>
      </button>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-title">Analytics</div>
      <button class="agent-btn disabled"    data-agent="instistati">
        <span class="emoji">📸</span><span class="name">InstiStati</span>
        <span class="status-tag">Soon</span>
      </button>
      <button class="agent-btn disabled"    data-agent="statsy">
        <span class="emoji">📊</span><span class="name">Statsy</span>
        <span class="status-tag">Soon</span>
      </button>
      <button class="agent-btn disabled"    data-agent="addy">
        <span class="emoji">🎯</span><span class="name">Addy</span>
        <span class="status-tag">Soon</span>
      </button>
      <button class="agent-btn disabled"    data-agent="paid-marketing">
        <span class="emoji">💰</span><span class="name">PaidMarketing</span>
        <span class="status-tag">Soon</span>
      </button>
    </div>
  </aside>

  <!-- Chat Area -->
  <div class="chat-area">

    <div class="agent-header" id="agentHeader" style="display:none">
      <div class="agent-header-inner">
        <div class="big-emoji" id="agentEmoji"></div>
        <div>
          <h2 id="agentName"></h2>
          <p id="agentDesc"></p>
        </div>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="big">🛡️</div>
        <h3>OHN Agent Testing</h3>
        <p>Select an agent from the sidebar to start testing. Researchy and Googly are live.</p>
        <div class="hint-pills">
          <span class="hint-pill" onclick="quickSelect('researchy', 'Scan for new scam topics')">👀 Try Researchy</span>
          <span class="hint-pill" onclick="quickSelect('googly', 'Email phishing scam')">🔍 Try Googly</span>
        </div>
      </div>
    </div>

    <div class="input-area">
      <input type="text" id="msgInput" placeholder="Select an agent to start…" disabled
             onkeydown="if(event.key==='Enter') sendMessage()" />
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>Send</button>
    </div>

  </div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let currentAgent = null;
  let agents = [];
  let isLoading = false;

  // ── Init ───────────────────────────────────────────────────────────────────
  fetch('/api/agents')
    .then(r => r.json())
    .then(data => { agents = data; });

  // ── Agent Selection ────────────────────────────────────────────────────────
  function selectAgent(btn) {
    if (btn.classList.contains('disabled')) return;
    document.querySelectorAll('.agent-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const agentId = btn.dataset.agent;
    const agent   = agents.find(a => a.id === agentId) ?? {
      id: agentId, emoji: '🤖', name: agentId, description: ''
    };
    currentAgent = agent;

    // Update header
    document.getElementById('agentHeader').style.display = 'block';
    document.getElementById('agentEmoji').textContent = agent.emoji;
    document.getElementById('agentName').textContent  = agent.name;
    document.getElementById('agentDesc').textContent  = agent.description;

    // Clear messages and show agent welcome
    const msgs = document.getElementById('messages');
    msgs.innerHTML = '';
    addAgentMessage(getWelcomeMessage(agent), 'text');

    // Enable input
    const input = document.getElementById('msgInput');
    input.disabled  = false;
    input.placeholder = `Message ${agent.name}…`;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }

  function quickSelect(agentId, message) {
    const btn = document.querySelector(`[data-agent="${agentId}"]`);
    if (btn && !btn.classList.contains('disabled')) {
      selectAgent(btn);
      setTimeout(() => {
        document.getElementById('msgInput').value = message;
        sendMessage();
      }, 100);
    }
  }

  function getWelcomeMessage(agent) {
    const messages = {

  // ── Send Message ───────────────────────────────────────────────────────────
  async function sendMessage() {
    if (!currentAgent || isLoading) return;
    const input = document.getElementById('msgInput');
    const text  = input.value.trim();
    if (!text) return;

    input.value = '';
    addUserMessage(text);
    showTyping();
    setLoading(true);

    try {
      if (currentAgent.id === 'googly') {
        await streamGoogly(text);
      } else if (currentAgent.id === 'scripty') {
        await streamScripty(text, null, null);
      } else {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ agentId: currentAgent.id, message: text }),
        });

        const data = await res.json();
        hideTyping();

        if (!res.ok || data.error) {
          addAgentMessage(data.error ?? 'Something went wrong.', 'error');
          if (data.logs) renderLogsPanel(data.logs);
        } else if (data.type === 'researchy') {
          renderResearchyResult(data.result, data.logs ?? []);
        } else {
          addAgentMessage(data.result?.message ?? 'No response.', 'text');
        }
      }
    } catch (err) {
      hideTyping();
      addAgentMessage(`Error: ${err?.message ?? 'Something went wrong. Check console for details.'}`, 'error');
      setLoading(false);
    }

    // For SSE agents, setLoading(false) is called inside the stream handler
    if (currentAgent.id !== 'googly' && currentAgent.id !== 'scripty') {
      setLoading(false);
    }
  }

  // ── Googly SSE Streaming ───────────────────────────────────────────────────
  async function streamGoogly(text) {
    // Show a live progress card that we update as events arrive
    const msgs = document.getElementById('messages');
    const progressDiv = document.createElement('div');
    progressDiv.className = 'msg agent';
    progressDiv.id = 'googly-progress';
    progressDiv.innerHTML = `
      <div class="msg-meta">Googly 🔍</div>
      <div class="bubble">
        <div id="googly-steps" style="display:flex;flex-direction:column;gap:8px;font-size:13px;">
          <div style="color:var(--text-muted);">Connecting…</div>
        </div>
        <div id="googly-debug" style="margin-top:12px;background:#0a0f1a;border:1px solid #1e293b;border-radius:6px;padding:8px;font-family:monospace;font-size:10px;color:#475569;max-height:200px;overflow-y:auto;"></div>
      </div>`;
    msgs.appendChild(progressDiv);
    scrollBottom();

    const debugEl = document.getElementById('googly-debug');
    const dbg = (msg) => {
      const ts = new Date().toISOString().slice(11,23);
      const line = document.createElement('div');
      line.textContent = `[${ts}] ${msg}`;
      debugEl.appendChild(line);
      debugEl.scrollTop = debugEl.scrollHeight;
      console.log('[Googly SSE]', msg);
    };

    const stepsEl = document.getElementById('googly-steps');
    const stepIcons = {
      extracting_topic: '🧠',
      searching:        '🔎',
      scraping:         '📄',
      extracting_facts: '✍️',
      done:             '✅',
    };

    function addStep(icon, message, style = '') {
      const el = document.createElement('div');
      el.style.cssText = style || 'color:var(--text-muted);';
      el.innerHTML = `${icon} ${escHtml(message)}`;
      stepsEl.appendChild(el);
      scrollBottom();
      return el;
    }

    function updateLastStep(icon, message, style = '') {
      const last = stepsEl.lastElementChild;
      if (last) {
        last.innerHTML = `${icon} ${escHtml(message)}`;
        if (style) last.style.cssText = style;
      }
    }

    // Abort after 90s — Vercel max is 60s, so this guarantees a clean error message
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 90000);

    try {
      const response = await fetch('/api/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ agentId: 'googly', message: text }),
        signal: controller.signal,
      });
      clearTimeout(timeoutId);

      if (!response.ok) {
        const err = await response.json().catch(() => ({ error: 'Server error' }));
        stepsEl.innerHTML = `<div style="color:#f87171;">Error: ${escHtml(err.error ?? 'Unknown error')}</div>`;
        setLoading(false);
        return;
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let lastStepEl = null;

      const processLines = (lines, source) => {
        for (const line of lines) {
          if (!line.trim()) continue;
          dbg(`  line(${source}): "${line.slice(0, 80)}${line.length > 80 ? '…' : ''}"`);
          if (!line.startsWith('data: ')) continue;
          let event;
          try {
            event = JSON.parse(line.slice(6));
            dbg(`  → parsed event type="${event.type}"`);
          } catch (e) {
            dbg(`  → JSON parse FAILED: ${e.message}`);
            continue;
          }

          if (event.type === 'start') {
            stepsEl.innerHTML = '';
          } else if (event.type === 'progress') {
            const icon = stepIcons[event.step] ?? '⚙️';
            lastStepEl = addStep(icon, event.message, 'color:var(--text);');
            scrollBottom();
          } else if (event.type === 'complete') {
            dbg('  → COMPLETE received — calling renderGooglyResult');
            try {
              progressDiv.remove();
              hideTyping();
              renderGooglyResult(event.result, event.logs ?? []);
              dbg('  → render OK');
            } catch (renderErr) {
              dbg(`  → RENDER CRASH: ${renderErr?.message}`);
              stepsEl.innerHTML = `
                <div style="color:#f87171;margin-bottom:8px;">❌ Render error: ${escHtml(renderErr?.message ?? String(renderErr))}</div>
                <details style="font-size:11px;color:var(--text-muted);">
                  <summary style="cursor:pointer;">Raw result</summary>
                  <pre style="white-space:pre-wrap;word-break:break-all;margin-top:6px;font-size:10px;color:#7dd3fc;">${escHtml(JSON.stringify(event.result, null, 2).slice(0, 5000))}</pre>
                </details>`;
            }
          } else if (event.type === 'error') {
            dbg(`  → ERROR event: ${event.error}`);
            stepsEl.innerHTML = `<div style="color:#f87171;">❌ ${escHtml(event.error ?? 'Unknown error')}</div>`;
            hideTyping();
          }
        }
      };

      let chunkNum = 0;
      while (true) {
        const { done, value } = await reader.read();
        chunkNum++;
        dbg(`chunk #${chunkNum} done=${done} bytes=${value?.length ?? 0}`);

        if (value) {
          buffer += decoder.decode(value, { stream: !done });
          const lines = buffer.split('\n');
          buffer = lines.pop();
          dbg(`  buffer after split: ${lines.length} lines, remainder="${buffer.slice(0,40)}"`);
          processLines(lines, `chunk#${chunkNum}`);
        }

        if (done) {
          dbg(`stream ended — buffer remainder="${buffer.slice(0,80)}"`);
          if (buffer.trim()) processLines([buffer], 'flush');
          break;
        }
      }
      dbg('stream loop exited');
    } catch (err) {
      clearTimeout(timeoutId);
      const msg = err?.name === 'AbortError'
        ? 'Timed out after 90s — the report is taking too long. Please try again.'
        : (err?.message ?? 'Network error');
      stepsEl.innerHTML = `<div style="color:#f87171;">❌ ${escHtml(msg)}</div>`;
    }

    setLoading(false);
  }

  // ── Scripty SSE Streaming ──────────────────────────────────────────────────
  async function streamScripty(message, topic, researchReport) {
    const msgs = document.getElementById('messages');
    const progressDiv = document.createElement('div');
    progressDiv.className = 'msg agent';
    progressDiv.id = 'scripty-progress';
    progressDiv.innerHTML = `
      <div class="msg-meta">Scripty 🎬</div>
      <div class="bubble">
        <div id="scripty-steps" style="display:flex;flex-direction:column;gap:8px;font-size:13px;">
          <div style="color:var(--text-muted);">Connecting…</div>
        </div>
      </div>`;
    msgs.appendChild(progressDiv);
    scrollBottom();

    const stepsEl = document.getElementById('scripty-steps');
    const stepIcons = { writing_core: '✍️', core_complete: '✅', writing_hooks: '🎣', done: '🎬' };

    function addStep(icon, message) {
      const el = document.createElement('div');
      el.style.color = 'var(--text)';
      el.innerHTML = `${icon} ${escHtml(message)}`;
      stepsEl.appendChild(el);
      scrollBottom();
    }

    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 90000);

    try {
      const body = { agentId: 'scripty', message, topic: topic ?? message, researchReport: researchReport ?? undefined };
      const response = await fetch('/api/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
        signal: controller.signal,
      });
      clearTimeout(timeoutId);

      if (!response.ok) {
        const err = await response.json().catch(() => ({ error: 'Server error' }));
        stepsEl.innerHTML = `<div style="color:#f87171;">Error: ${escHtml(err.error ?? 'Unknown error')}</div>`;
        setLoading(false);
        return;
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      const processLines = (lines) => {
        for (const line of lines) {
          if (!line.trim() || !line.startsWith('data: ')) continue;
          let event;
          try { event = JSON.parse(line.slice(6)); } catch { continue; }

          if (event.type === 'start') {
            stepsEl.innerHTML = '';
          } else if (event.type === 'progress') {
            const icon = stepIcons[event.step] ?? '⚙️';
            addStep(icon, event.message);
          } else if (event.type === 'complete') {
            progressDiv.remove();
            hideTyping();
            renderScriptyResult(event.result, event.logs ?? []);
          } else if (event.type === 'error') {
            stepsEl.innerHTML = `<div style="color:#f87171;">❌ ${escHtml(event.error ?? 'Unknown error')}</div>`;
            hideTyping();
          }
        }
      };

      while (true) {
        const { done, value } = await reader.read();
        if (value) {
          buffer += decoder.decode(value, { stream: !done });
          const lines = buffer.split('\n');
          buffer = lines.pop();
          processLines(lines);
        }
        if (done) {
          if (buffer.trim()) processLines([buffer]);
          break;
        }
      }
    } catch (err) {
      clearTimeout(timeoutId);
      const msg = err?.name === 'AbortError'
        ? 'Timed out after 90s. Please try again.'
        : (err?.message ?? 'Network error');
      stepsEl.innerHTML = `<div style="color:#f87171;">❌ ${escHtml(msg)}</div>`;
    }

    setLoading(false);
  }

  function renderResearchyResult(result, logs = []) {
    const msgs = document.getElementById('messages');
    const div  = document.createElement('div');
    div.className = 'msg agent';

    const shortlist = result.shortlist ?? [];
    const excluded  = result.excluded  ?? [];
    const meta      = result.meta      ?? {};

    // Sort shortlist newest first by parsing relative time strings
    function ageMinutes(postedAt) {
      const s = (postedAt ?? '').toLowerCase();
      const n = parseInt(s) || 1;
      if (s.includes('minute')) return n;
      if (s.includes('hour'))   return n * 60;
      if (s.includes('day'))    return n * 1440;
      if (s.includes('week'))   return n * 10080;
      return 99999;
    }
    const sorted = [...shortlist].sort((a, b) => ageMinutes(a.postedAt) - ageMinutes(b.postedAt));

    // Build shortlist cards — simple: title, summary, date, link
    const topicCards = sorted.map((t, i) => {
      const dupeNote = t.relatedPosts?.length > 0
        ? `<div style="margin-top:6px;font-size:11px;color:var(--text-muted);">Also seen in ${t.relatedPosts.length} similar post${t.relatedPosts.length > 1 ? 's' : ''}</div>` : '';
      return `
        <div class="topic-card" style="border-left-color:#3b82f6;">
          <div class="topic-header">
            <div class="topic-rank">${i + 1}</div>
            <div class="topic-name" style="font-size:13px;">${escHtml(t.originalTitle)}</div>
          </div>
          <div class="topic-field" style="margin-top:8px;">${escHtml(t.summary)}</div>
          <div class="topic-stats" style="margin-top:8px;">
            <span class="topic-stat">🕐 ${escHtml(t.postedAt)}</span>
          </div>
          ${dupeNote}
          <div class="topic-link" style="margin-top:8px;"><a href="${escHtml(t.redditUrl)}" target="_blank">View on Reddit →</a></div>
        </div>`;
    }).join('');

    // Build excluded list HTML
    const excludedItems = excluded.map(e => `
      <div class="excluded-item">
        <div class="ex-title">${escHtml(e.originalTitle)}</div>
        <div class="ex-reason">→ ${escHtml(e.exclusionReason)}</div>
        ${e.redditUrl ? `<div style="margin-top:4px;font-size:10px;"><a href="${escHtml(e.redditUrl)}" target="_blank" style="color:#60a5fa;">View on Reddit →</a></div>` : ''}
      </div>`).join('');

    div.innerHTML = `
      <div class="msg-meta">Researchy 👀</div>
      <div class="bubble">
        <div class="result-wrap">

          <!-- Copy for Claude button -->
          <div style="font-family:monospace;font-size:10px;background:#0a0f1a;border:1px solid #1e293b;border-radius:6px;padding:6px 10px;display:flex;justify-content:flex-end;">
            <button id="copy-btn-result" style="background:#1e3a5f;border:1px solid #3b82f6;border-radius:4px;color:#93c5fd;font-size:10px;padding:3px 10px;cursor:pointer;font-family:monospace;white-space:nowrap;">📋 Copy result for Claude</button>
          </div>

          <!-- Stats bar -->
          <div class="funnel-card">
            <h4>Scan complete · ${escHtml(meta.timeWindow ?? '')}</h4>
            <div class="funnel-row">
              <span class="label">Posts reviewed</span>
              <span class="value">${meta.rawPostsReviewed ?? 0}</span>
            </div>
            <div class="funnel-row">
              <span class="label">Online scams shortlisted</span>
              <span class="value" style="color:#6ee7b7;">${shortlist.length}</span>
            </div>
            <div class="funnel-row">
              <span class="label">Excluded (not online / not a scam)</span>
              <span class="value" style="color:#f87171;">${excluded.length}</span>
            </div>
          </div>

          <!-- Shortlist -->
          <div class="shortlist-title">Online Scams · ${shortlist.length} found</div>
          ${topicCards || '<div class="summary-line">No online scams found in this batch.</div>'}

          <!-- Excluded toggle -->
          ${excluded.length > 0 ? `
            <div>
              <button class="excluded-toggle" onclick="toggleExcluded(this)">
                <span>🚫 ${excluded.length} posts excluded — see why</span>
                <span>▼</span>
              </button>
              <div class="excluded-list">${excludedItems}</div>
            </div>
          ` : ''}

          <!-- Agent note -->
          ${result.agentNote ? `<div class="agent-note-card">${escHtml(result.agentNote)}</div>` : ''}

        </div>

    msgs.appendChild(div);
    scrollBottom();

    // Wire up the copy button
    const copyBtn = document.getElementById('copy-btn-result');
    if (copyBtn) {
      copyBtn.addEventListener('click', () => {
        const payload = JSON.stringify({ result, logs }, null, 2);
        navigator.clipboard.writeText(payload).then(() => {
          copyBtn.textContent = '✅ Copied!';
          setTimeout(() => { copyBtn.textContent = '📋 Copy result for Claude'; }, 2000);
        });

          </div>`}

          <!-- Stats + sources toggle -->
          <div>
            <button class="excluded-toggle" onclick="toggleExcluded(this)">
              <span>🌐 ${queriesRun} searches · ${totalSources} sources (${tier1Count} gov, ${tier2Count} cybersec, ${tier3Count} rejected)</span>
              <span>▼</span>
            </button>
            <div class="excluded-list">
              <div style="display:flex;flex-direction:column;gap:12px;padding-top:10px;">
                ${tier1Sources.length > 0 ? `<div style="font-size:10px;font-weight:700;color:#6ee7b7;text-transform:uppercase;letter-spacing:0.8px;">🟢 Tier 1 — Government &amp; Law Enforcement</div>
                <div style="display:flex;flex-direction:column;gap:8px;">${tier1Sources.map(sourceCard).join('')}</div>` : ''}
                ${tier2Sources.length > 0 ? `<div style="font-size:10px;font-weight:700;color:#93c5fd;text-transform:uppercase;letter-spacing:0.8px;">🔵 Tier 2 — Cybersecurity &amp; News</div>
                <div style="display:flex;flex-direction:column;gap:8px;">${tier2Sources.map(sourceCard).join('')}</div>` : ''}
                ${tier3Sources.length > 0 ? `<div style="font-size:10px;font-weight:700;color:#f87171;text-transform:uppercase;letter-spacing:0.8px;">🔴 Tier 3 — Rejected</div>
                <div style="display:flex;flex-direction:column;gap:8px;">${tier3Sources.map(sourceCard).join('')}</div>` : ''}
              </div>
            </div>
          </div>

          <!-- Generate Script button -->
          ${extractedFacts ? `
          <div style="padding-top:4px;">
            <button onclick="handleGenerateScript(${JSON.stringify(topic)}, ${JSON.stringify(extractedFacts ?? '')})"
              style="background:#166534;border:1px solid #22c55e;color:#d1fae5;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;">
              🎬 Generate Script with Scripty →
            </button>
          </div>` : ''}

          <!-- Pipeline logs -->
          ${buildLogsHtml(logs)}
        </div>
      </div>`;

    msgs.appendChild(div);
    scrollBottom();
  }

  function handleGenerateScript(topic, researchReport) {
    // Switch to Scripty agent
    const scriptyAgent = agents.find(a => a.id === 'scripty');
    if (scriptyAgent) selectAgent(scriptyAgent);

    // Show user message and kick off the stream
    addUserMessage(`Generate script for: ${topic}`);
    showTyping();
    setLoading(true);
    streamScripty(topic, topic, researchReport);
  }

  // ── Scripty Result Renderer ────────────────────────────────────────────────
  function renderScriptyResult(result, logs = []) {
    const msgs = document.getElementById('messages');
    const div  = document.createElement('div');
    div.className = 'msg agent';

    const { topic, hookOptions = [], selectedHook, preHookNote, context, tension, pivot, payoff, fullScript, wordCount, captionHook } = result;

    const sectionBlock = (label, color, text) => `
      <div style="background:var(--surface2);border:1px solid var(--border);border-left:3px solid ${color};border-radius:var(--radius);padding:12px 14px;">
        <div style="font-size:9px;font-weight:700;color:${color};text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;">${label}</div>
        <div style="font-size:13px;color:var(--text);line-height:1.7;">${escHtml(text)}</div>
      </div>`;

    const hookCards = hookOptions.map((h, i) => `
      <div style="background:var(--surface2);border:1px solid ${h === selectedHook ? '#a855f7' : 'var(--border)'};border-left:3px solid ${h === selectedHook ? '#a855f7' : 'var(--border)'};border-radius:var(--radius);padding:10px 12px;font-size:13px;color:var(--text);">
        ${h === selectedHook ? '<span style="font-size:9px;font-weight:700;color:#a855f7;text-transform:uppercase;letter-spacing:0.8px;display:block;margin-bottom:4px;">★ Selected hook</span>' : `<span style="font-size:9px;color:var(--text-muted);display:block;margin-bottom:4px;">Option ${i + 1}</span>`}
        "${escHtml(h)}"
      </div>`).join('');

    div.innerHTML = `
      <div class="msg-meta">Scripty 🎬</div>
      <div class="bubble">
        <div class="result-wrap">

          <!-- Topic -->
          <div style="background:#120a24;border:1px solid #3b1f6e;border-left:3px solid #a855f7;border-radius:var(--radius);padding:12px 16px;">
            <div style="font-size:10px;font-weight:700;color:#c084fc;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px;">🎬 Script — ${escHtml(topic)}</div>
            <div style="font-size:12px;color:var(--text-muted);">${wordCount} words · ${hookOptions.length} hook options</div>
          </div>

          <!-- Selected hook (hero) -->
          <div style="background:#120a24;border:1px solid #a855f7;border-radius:var(--radius);padding:14px 16px;">
            <div style="font-size:10px;font-weight:700;color:#c084fc;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;">🎣 Selected Hook</div>
            <div style="font-size:15px;font-weight:700;color:#f3e8ff;line-height:1.5;">"${escHtml(selectedHook)}"</div>
            ${preHookNote ? `<div style="margin-top:8px;font-size:11px;color:var(--text-muted);font-style:italic;">${escHtml(preHookNote)}</div>` : ''}
          </div>

          <!-- Core sections -->
          ${sectionBlock('Context', '#60a5fa', context)}
          ${sectionBlock('Tension', '#f87171', tension)}
          ${sectionBlock('Pivot',   '#fbbf24', pivot)}
          ${sectionBlock('Payoff',  '#34d399', payoff)}

          <!-- Caption hook -->
          ${captionHook ? `
          <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;">
            <div style="font-size:9px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px;">📝 Caption Hook</div>
            <div style="font-size:13px;color:var(--text);font-style:italic;">"${escHtml(captionHook)}"</div>
          </div>` : ''}

          <!-- All hook options -->
          <div>
            <button class="excluded-toggle" onclick="toggleExcluded(this)">
              <span>🎣 All ${hookOptions.length} hook options</span>
              <span>▼</span>
            </button>
            <div class="excluded-list">
              <div style="display:flex;flex-direction:column;gap:8px;padding-top:10px;">
                ${hookCards}
              </div>
            </div>
          </div>

          <!-- Full combined script -->
          <div>
            <button class="excluded-toggle" onclick="toggleExcluded(this)">
              <span>📋 Full combined script</span>
              <span>▼</span>
            </button>
            <div class="excluded-list">
              <div style="padding-top:10px;font-size:13px;color:var(--text);line-height:1.8;white-space:pre-wrap;">${escHtml(fullScript)}</div>
            </div>
          </div>

          <!-- Pipeline logs -->
          ${buildLogsHtml(logs)}
        </div>
      </div>`;

    msgs.appendChild(div);
    scrollBottom();
  }

  // ── Typing Indicator ───────────────────────────────────────────────────────
  let typingEl = null;
  function showTyping() {
    const msgs = document.getElementById('messages');
    const div  = document.createElement('div');
    div.className  = 'msg agent';
    div.id         = 'typing-indicator';
    div.innerHTML  = `<div class="msg-meta">${currentAgent?.name ?? 'Agent'}</div>
      <div class="typing"><span></span><span></span><span></span></div>`;
    msgs.appendChild(div);
    scrollBottom();
  }
  function hideTyping() {
    document.getElementById('typing-indicator')?.remove();
  }

  // ── Helpers ────────────────────────────────────────────────────────────────
  function setLoading(state) {
    isLoading = state;
    document.getElementById('msgInput').disabled  = state;
    document.getElementById('sendBtn').disabled   = state;
    document.getElementById('sendBtn').textContent = state ? '…' : 'Send';
  }

  function scrollBottom() {
    const msgs = document.getElementById('messages');
    msgs.scrollTop = msgs.scrollHeight;
  }

  function toggleExcluded(btn) {
    const list = btn.nextElementSibling;
    list.classList.toggle('open');
    btn.querySelector('span:last-child').textContent = list.classList.contains('open') ? '▲' : '▼';
  }

  function escHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>

</body>
</html>
